spring:
  application:
    name: pieml-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:bd_pieml}
    username: ${DB_USER:oservices}
    password: ${DB_PASSWORD:Services@2025*!}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: always
      schema-locations: classpath:db/citizen-location-patch.sql,classpath:db/center-schedule-patch.sql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:oliveservicespro@gmail.com}
    password: ${MAIL_PASSWORD:snnc vdsq hmal akrr}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_TLS:true}
            required: ${MAIL_SMTP_TLS_REQUIRED:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:7000}

app:
  jwt:
    secret: ${JWT_SECRET:PIEML-Super-Secret-Key-For-JWT-Token-Generation-2024-Mali}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  payment:
    registration-fee: 12000
    service-fee: 0
  auto-validate: true
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:oliveservicespro@gmail.com}
    from-name: ${MAIL_FROM_NAME:PIE ML - Immatriculation Mali}
  contact:
    to: ${CONTACT_TO:oliveservicespro@gmail.com}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:10}
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

logging:
  level:
    ml.gouv.pie: INFO
