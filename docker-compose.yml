services:
  postgres:
    image: postgres:16-alpine
    container_name: pieml-postgres
    environment:
      POSTGRES_DB: ${PIEML_DB:-${DB_NAME:-bd_pieml}}
      POSTGRES_USER: ${PIEML_DB_USER:-${DB_USER:-oservices}}
      POSTGRES_PASSWORD: ${PIEML_DB_PASS:-${DB_PASSWORD:-Services@2025*!}}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pieml_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PIEML_DB_USER:-${DB_USER:-oservices}} -d ${PIEML_DB:-${DB_NAME:-bd_pieml}}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: pieml-backend:local
    container_name: pieml-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 7000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PIEML_DB:-${DB_NAME:-bd_pieml}}
      DB_USER: ${PIEML_DB_USER:-${DB_USER:-oservices}}
      DB_PASSWORD: ${PIEML_DB_PASS:-${DB_PASSWORD:-Services@2025*!}}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://e-pie.ml,http://e-pie.ml,https://www.e-pie.ml,http://www.e-pie.ml}
      FRONTEND_URL: ${FRONTEND_URL:-https://e-pie.ml}
      JWT_SECRET: ${PIEML_JWT_SECRET:-${JWT_SECRET:-change-me-in-production}}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_USERNAME: ${SMTP_USER:-}
      MAIL_PASSWORD: ${SMTP_PASSWORD:-}
      UPLOAD_DIR: ${PIEML_UPLOAD_DIR:-${UPLOAD_DIR:-/app/uploads/PIEML}}
    ports:
      - "7000:7000"
    volumes:
      - ${PIEML_UPLOAD_HOST_PATH:-${UPLOAD_HOST_PATH:-pieml_uploads}}:/app/uploads/PIEML

  frontend:
    build: ../frontend_pieml
    image: pieml-frontend:local
    container_name: pieml-frontend
    depends_on:
      - backend
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: 7000
    ports:
      - "80:80"

volumes:
  pieml_pgdata:
  pieml_uploads:
