services:
  postgres:
    image: postgres:16-alpine
    container_name: pieml-postgres
    environment:
      POSTGRES_DB: pieml
      POSTGRES_USER: pieml
      POSTGRES_PASSWORD: pieml123
    ports:
      - "5432:5432"
    volumes:
      - pieml_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pieml -d pieml"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pieml_pgdata:
